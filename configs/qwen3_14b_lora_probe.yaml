# Qwen3-14B · FC LoRA — 计时探针(只跑 50 步测 s/it,不产出可用权重)
# 与正式 qwen3_14b_lora_sft.yaml 保持同 batch/grad_accum/cutoff,保证步速有代表性。
# 差异:基座=本地路径; flash_attn=sdpa(pgx 无 flash-attn); max_steps=50; 关 eval/save。
# 运行: llamafactory-cli train configs/qwen3_14b_lora_probe.yaml

### model
model_name_or_path: /path/to/Qwen3-14B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset: fc_sft
dataset_dir: data/processed
template: qwen3
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen3-14b-fc-probe
logging_steps: 1
save_strategy: "no"
plot_loss: false
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16      # 有效 batch 16(与正式一致)
max_steps: 50                        # 只跑 50 优化步
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
flash_attn: sdpa                     # pgx(aarch64+sm_121)无 flash-attn,退 PyTorch SDPA
gradient_checkpointing: true
ddp_timeout: 180000000
seed: 42

### eval
val_size: 0                          # 探针不做 eval,纯测训练步速
